# ─────────────────────────────────────────────────────────────────────────────
# EdenOS Analytics Worker — wrangler.toml
# ─────────────────────────────────────────────────────────────────────────────
#
# SECRETS (set via wrangler secret put — never store in this file):
#   SEGMENT_WRITE_KEY   → Segment write key for Eden OS source
#   SERVER_API_SECRET   → Authenticates /server-collect from HealthOS
#
# LOCAL TEST:
#   wrangler dev --port 8787
#
# DEPLOY:
#   wrangler deploy
# ─────────────────────────────────────────────────────────────────────────────

name               = "eden-analytics"
main               = "eden-analytics-worker.js"
compatibility_date = "2024-09-23"

# ── Routes — approved scope only ──────────────────────────────────────────────
# To add new domain: add route here + add to ALLOWED_ORIGINS in worker → deploy
routes = [
  { pattern = "eden.health/*",     zone_name = "eden.health" },
  { pattern = "www.eden.health/*", zone_name = "eden.health" },
  { pattern = "app.eden.health/*", zone_name = "eden.health" },
]

# ── KV Namespace — attribution storage (120 day TTL) ─────────────────────────
# Stores gclid + click IDs against anonymousId and userId
# KV namespace already created — id confirmed from session
[[kv_namespaces]]
binding = "GCLID_KV"
id      = "12c53db492b7419d8717d6d23831d186"
