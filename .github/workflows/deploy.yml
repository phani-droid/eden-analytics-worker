# ─────────────────────────────────────────────────────────────────────────────
# EdenOS Analytics Worker — GitHub Actions Deploy
# ─────────────────────────────────────────────────────────────────────────────
#
# SECRETS REQUIRED IN GITHUB (one time setup):
#   Repository → Settings → Secrets and variables → Actions → New repository secret
#
#   CLOUDFLARE_API_TOKEN   → from Cloudflare dashboard → My Profile → API Tokens
#   CLOUDFLARE_ACCOUNT_ID  → from Cloudflare dashboard → right sidebar
#
# NOTE: SEGMENT_WRITE_KEY and SERVER_API_SECRET are stored directly in
# Cloudflare via "wrangler secret put" — NOT in GitHub secrets.
#
# TRIGGERS:
#   - push to main        → auto deploy
#   - workflow_dispatch   → manual trigger from GitHub Actions tab
#
# VERSION CHECK:
#   Checks ok:true only — no hardcoded version string.
#   Future version bumps deploy without any yaml changes.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy EdenOS Analytics Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:  # manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # suppress Node.js deprecation warnings

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:

      # ── Step 1 — Checkout ─────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2 — Deploy ───────────────────────────────────────────────────
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      # ── Step 3 — Verify ───────────────────────────────────────────────────
      # Checks ok:true only — no hardcoded version string
      # Future deploys (v5.23, v5.24 etc.) work without changing this file
      - name: Verify worker is live
        run: |
          echo "⏳ Waiting 15s for Cloudflare propagation..."
          sleep 15

          response=$(curl -s --max-time 10 https://app.eden.health/eden-health-check)
          echo "Health check response: $response"

          if echo "$response" | grep -q '"ok":true'; then
            version=$(echo "$response" | grep -o '"version":"[^"]*"' | head -1)
            echo "✅ Worker live — $version"
          else
            echo "🚨 Health check failed — worker may not be live"
            echo "Response was: $response"
            exit 1
          fi
