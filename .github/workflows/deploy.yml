# ─────────────────────────────────────────────────────────────────────────────
# EdenOS Analytics Worker — GitHub Actions Deploy
# ─────────────────────────────────────────────────────────────────────────────
#
# WHAT THIS DOES:
#   Every push to main branch → automatically deploys worker to Cloudflare
#   Pull requests → runs tests only (no deploy)
#
# SECRETS TO ADD IN GITHUB (one time):
#   Repository → Settings → Secrets and variables → Actions → New repository secret
#
#   CLOUDFLARE_API_TOKEN   → from Cloudflare dashboard (see README)
#   CLOUDFLARE_ACCOUNT_ID  → from Cloudflare dashboard (see README)
#   SEGMENT_WRITE_KEY      → from Segment > Sources > Eden OS > API Keys
#   SERVER_API_SECRET      → random string (openssl rand -hex 32)

name: Deploy EdenOS Analytics Worker

on:
  push:
    branches:
      - main          # deploy on every push to main
  pull_request:
    branches:
      - main          # test only on PRs — no deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    steps:
      # Step 1 — checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — deploy to Cloudflare
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          secrets: |
            SEGMENT_WRITE_KEY
            SERVER_API_SECRET
        env:
          SEGMENT_WRITE_KEY: ${{ secrets.SEGMENT_WRITE_KEY }}
          SERVER_API_SECRET: ${{ secrets.SERVER_API_SECRET }}

      # Step 3 — verify deployment
      - name: Verify worker is live
        run: |
          sleep 10
          response=$(curl -s https://app.eden.health/eden-health-check)
          echo "Health check response: $response"
          echo $response | grep -q '"ok":true' && echo "✅ Worker deployed successfully" || echo "⚠️ Health check failed — check Cloudflare dashboard"
