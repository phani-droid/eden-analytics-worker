# ─────────────────────────────────────────────────────────────────────────────
# EdenOS Analytics Worker — GitHub Actions Deploy
# ─────────────────────────────────────────────────────────────────────────────
#
# SECRETS REQUIRED IN GITHUB (one time):
#   Repository → Settings → Secrets and variables → Actions → New repository secret
#
#   CLOUDFLARE_API_TOKEN   → from Cloudflare dashboard
#   CLOUDFLARE_ACCOUNT_ID  → from Cloudflare dashboard
#
# NOTE: SEGMENT_WRITE_KEY and SERVER_API_SECRET are stored directly in
# Cloudflare via "wrangler secret put" — NOT in GitHub secrets.
#
# CHANGES vs previous:
#   - pull_request trigger REMOVED — secrets not available in PR context
#     from forks, causes exit code 1 failures
#   - workflow_dispatch added — allows manual trigger from Actions tab
#   - FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 added — fixes Node.js deprecation
#   - wrangler-action pinned to @v3 with explicit command: deploy
#   - health check improved — shows full response on failure
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy EdenOS Analytics Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:   # manual trigger from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # suppress Node.js 20 warnings

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers

    # Only deploy on push to main — not on PRs
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      # ── Step 1 — Checkout ─────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Step 2 — Deploy ───────────────────────────────────────────────────
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy    # explicit — prevents wrangler from guessing

      # ── Step 3 — Verify ───────────────────────────────────────────────────
      - name: Verify worker is live
        run: |
          echo "⏳ Waiting for propagation..."
          sleep 15
          response=$(curl -s --max-time 10 https://app.eden.health/eden-health-check)
          echo "Health check response: $response"
          if echo "$response" | grep -q '"version":"5.20"'; then
            echo "✅ Worker v5.20 deployed and live"
          elif echo "$response" | grep -q '"ok":true'; then
            echo "⚠️ Worker live but version mismatch — check deployment"
            exit 1
          else
            echo "🚨 Health check failed — worker may not be live"
            exit 1
          fi
