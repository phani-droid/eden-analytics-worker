# ─────────────────────────────────────────────────────────────────────────────
# EdenOS Analytics Worker — GitHub Actions Deploy
# ─────────────────────────────────────────────────────────────────────────────
#
# SECRETS TO ADD IN GITHUB (one time):
#   Repository → Settings → Secrets and variables → Actions → New repository secret
#
#   CLOUDFLARE_API_TOKEN   → from Cloudflare dashboard
#   CLOUDFLARE_ACCOUNT_ID  → from Cloudflare dashboard
#
# NOTE: SEGMENT_WRITE_KEY and SERVER_API_SECRET are stored directly in
# Cloudflare via "wrangler secret put" — NOT in GitHub secrets.
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy EdenOS Analytics Worker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:

      # Step 1 — checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 — deploy to Cloudflare
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Step 3 — verify deployment
      - name: Verify worker is live
        run: |
          sleep 10
          response=$(curl -s https://app.eden.health/eden-health-check)
          echo "Health check response: $response"
          echo $response | grep -q '"ok":true' && echo "✅ Worker deployed successfully" || echo "⚠️ Health check failed — check Cloudflare dashboard"
